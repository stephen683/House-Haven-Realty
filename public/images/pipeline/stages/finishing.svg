<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Finishing interior">
  <rect width="800" height="400" fill="#F5F5F5"/>
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Room cross-section -->
    <rect x="120" y="80" width="560" height="260"/>
    <!-- Floor -->
    <line x1="120" y1="300" x2="680" y2="300"/>
    <line x1="120" y1="340" x2="680" y2="340"/>
    <!-- Floorboard lines -->
    <line x1="160" y1="300" x2="160" y2="340" stroke-width="1.5"/>
    <line x1="220" y1="300" x2="220" y2="340" stroke-width="1.5"/>
    <line x1="280" y1="300" x2="280" y2="340" stroke-width="1.5"/>
    <line x1="340" y1="300" x2="340" y2="340" stroke-width="1.5"/>
    <line x1="400" y1="300" x2="400" y2="340" stroke-width="1.5"/>
    <line x1="460" y1="300" x2="460" y2="340" stroke-width="1.5"/>
    <line x1="520" y1="300" x2="520" y2="340" stroke-width="1.5"/>
    <line x1="580" y1="300" x2="580" y2="340" stroke-width="1.5"/>
    <line x1="640" y1="300" x2="640" y2="340" stroke-width="1.5"/>
    <!-- Ceiling recessed light -->
    <circle cx="300" cy="95" r="8" fill="#000"/>
    <circle cx="500" cy="95" r="8" fill="#000"/>
    <!-- Window on back wall -->
    <rect x="330" y="140" width="140" height="100"/>
    <line x1="400" y1="140" x2="400" y2="240"/>
    <line x1="330" y1="190" x2="470" y2="190"/>
    <!-- Ladder -->
    <line x1="170" y1="110" x2="200" y2="290"/>
    <line x1="210" y1="110" x2="240" y2="290"/>
    <line x1="175" y1="140" x2="215" y2="140" stroke-width="2"/>
    <line x1="180" y1="170" x2="220" y2="170" stroke-width="2"/>
    <line x1="185" y1="200" x2="225" y2="200" stroke-width="2"/>
    <line x1="190" y1="230" x2="230" y2="230" stroke-width="2"/>
    <line x1="195" y1="260" x2="235" y2="260" stroke-width="2"/>
    <!-- Paint roller -->
    <line x1="570" y1="230" x2="620" y2="180"/>
    <line x1="620" y1="180" x2="640" y2="160"/>
    <rect x="625" y="145" width="45" height="18" transform="rotate(-45 647 154)" fill="#000"/>
    <!-- Paint can -->
    <rect x="555" y="275" width="40" height="25"/>
    <line x1="560" y1="275" x2="590" y2="275" stroke-width="2"/>
    <path d="M 565 275 Q 575 268 585 275" fill="none"/>
  </g>
</svg>
