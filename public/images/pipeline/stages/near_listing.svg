<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Near listing">
  <rect width="800" height="400" fill="#F5F5F5"/>
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Ground -->
    <line x1="40" y1="340" x2="760" y2="340"/>
    <!-- Walkway -->
    <line x1="380" y1="340" x2="430" y2="380"/>
    <line x1="420" y1="340" x2="480" y2="380"/>
    <!-- House -->
    <polygon points="220,340 220,220 400,130 580,220 580,340" fill="#fff"/>
    <!-- Roof -->
    <line x1="400" y1="130" x2="220" y2="220" stroke-width="3"/>
    <line x1="400" y1="130" x2="580" y2="220" stroke-width="3"/>
    <line x1="220" y1="220" x2="580" y2="220"/>
    <!-- Roof shingle hatching -->
    <line x1="260" y1="200" x2="280" y2="215" stroke-width="1.5"/>
    <line x1="310" y1="170" x2="330" y2="185" stroke-width="1.5"/>
    <line x1="360" y1="145" x2="380" y2="160" stroke-width="1.5"/>
    <line x1="440" y1="145" x2="460" y2="160" stroke-width="1.5"/>
    <line x1="490" y1="170" x2="510" y2="185" stroke-width="1.5"/>
    <line x1="540" y1="200" x2="560" y2="215" stroke-width="1.5"/>
    <!-- Windows -->
    <rect x="250" y="245" width="70" height="70"/>
    <line x1="285" y1="245" x2="285" y2="315"/>
    <line x1="250" y1="280" x2="320" y2="280"/>
    <rect x="480" y="245" width="70" height="70"/>
    <line x1="515" y1="245" x2="515" y2="315"/>
    <line x1="480" y1="280" x2="550" y2="280"/>
    <!-- Front door -->
    <rect x="370" y="250" width="60" height="90"/>
    <circle cx="418" cy="295" r="3" fill="#000"/>
    <!-- Yard sign post -->
    <line x1="650" y1="240" x2="650" y2="340" stroke-width="4"/>
    <!-- Sign board -->
    <rect x="595" y="215" width="120" height="70" fill="#fff"/>
    <text x="655" y="243" font-family="'Courier New',monospace" font-size="14" font-weight="700" text-anchor="middle" fill="#000" stroke="none">COMING</text>
    <text x="655" y="263" font-family="'Courier New',monospace" font-size="14" font-weight="700" text-anchor="middle" fill="#000" stroke="none">SOON</text>
  </g>
</svg>
