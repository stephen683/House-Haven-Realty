<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Framing stage">
  <rect width="800" height="400" fill="#F5F5F5"/>
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Ground line -->
    <line x1="40" y1="340" x2="760" y2="340"/>
    <!-- Foundation -->
    <rect x="180" y="330" width="440" height="10" fill="#000"/>
    <!-- Roof triangles -->
    <polyline points="180,330 180,220 400,120 620,220 620,330"/>
    <!-- Rafters fanning out from peak -->
    <line x1="400" y1="120" x2="180" y2="220"/>
    <line x1="400" y1="120" x2="230" y2="220"/>
    <line x1="400" y1="120" x2="280" y2="220"/>
    <line x1="400" y1="120" x2="340" y2="220"/>
    <line x1="400" y1="120" x2="400" y2="220"/>
    <line x1="400" y1="120" x2="460" y2="220"/>
    <line x1="400" y1="120" x2="520" y2="220"/>
    <line x1="400" y1="120" x2="570" y2="220"/>
    <line x1="400" y1="120" x2="620" y2="220"/>
    <!-- Top plate -->
    <line x1="180" y1="220" x2="620" y2="220"/>
    <!-- Vertical studs (16" on center style spacing) -->
    <line x1="220" y1="220" x2="220" y2="330"/>
    <line x1="260" y1="220" x2="260" y2="330"/>
    <line x1="300" y1="220" x2="300" y2="330"/>
    <line x1="340" y1="220" x2="340" y2="330"/>
    <line x1="380" y1="220" x2="380" y2="330"/>
    <line x1="420" y1="220" x2="420" y2="330"/>
    <line x1="460" y1="220" x2="460" y2="330"/>
    <line x1="500" y1="220" x2="500" y2="330"/>
    <line x1="540" y1="220" x2="540" y2="330"/>
    <line x1="580" y1="220" x2="580" y2="330"/>
    <!-- Window openings -->
    <rect x="295" y="255" width="50" height="45" stroke-width="4"/>
    <rect x="455" y="255" width="50" height="45" stroke-width="4"/>
    <!-- Door opening -->
    <rect x="385" y="250" width="30" height="80" stroke-width="4"/>
  </g>
</svg>
