<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Foundation poured">
  <rect width="800" height="400" fill="#F5F5F5"/>
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Ground line -->
    <line x1="40" y1="310" x2="760" y2="310"/>
    <!-- Concrete foundation slab (perspective) -->
    <polygon points="200,220 600,220 680,310 120,310"/>
    <!-- Rebar grid on top of slab -->
    <g stroke-width="2">
      <line x1="220" y1="225" x2="680" y2="225"/>
      <line x1="240" y1="240" x2="672" y2="240"/>
      <line x1="260" y1="258" x2="664" y2="258"/>
      <line x1="280" y1="278" x2="656" y2="278"/>
      <!-- vertical rebar -->
      <line x1="280" y1="225" x2="230" y2="305"/>
      <line x1="360" y1="225" x2="330" y2="305"/>
      <line x1="440" y1="225" x2="440" y2="305"/>
      <line x1="520" y1="225" x2="550" y2="305"/>
      <line x1="600" y1="225" x2="660" y2="305"/>
    </g>
    <!-- Anchor bolts sticking up -->
    <line x1="240" y1="225" x2="240" y2="195"/>
    <line x1="330" y1="225" x2="330" y2="195"/>
    <line x1="470" y1="225" x2="470" y2="195"/>
    <line x1="570" y1="225" x2="570" y2="195"/>
    <!-- Label band -->
    <text x="400" y="365" font-family="'Courier New',monospace" font-size="18" font-weight="700" text-anchor="middle" fill="#000" stroke="none">FOUNDATION SLAB</text>
  </g>
</svg>
