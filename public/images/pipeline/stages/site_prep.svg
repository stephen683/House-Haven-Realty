<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Site preparation">
  <rect width="800" height="400" fill="#F5F5F5"/>
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Ground line -->
    <line x1="40" y1="310" x2="760" y2="310"/>
    <!-- Dirt piles -->
    <path d="M 80 310 Q 140 270 200 310 Z" fill="#000" stroke="#000"/>
    <path d="M 620 310 Q 680 280 740 310 Z" fill="#000" stroke="#000"/>
    <!-- Excavator body -->
    <rect x="330" y="230" width="140" height="70"/>
    <!-- Cab -->
    <rect x="350" y="180" width="70" height="50"/>
    <line x1="350" y1="180" x2="380" y2="170"/>
    <line x1="420" y1="180" x2="390" y2="170"/>
    <!-- Tracks -->
    <rect x="315" y="300" width="170" height="18"/>
    <circle cx="335" cy="309" r="6" fill="#000"/>
    <circle cx="465" cy="309" r="6" fill="#000"/>
    <circle cx="400" cy="309" r="6" fill="#000"/>
    <!-- Arm -->
    <line x1="465" y1="250" x2="570" y2="190"/>
    <line x1="570" y1="190" x2="620" y2="250"/>
    <!-- Bucket -->
    <polyline points="615,245 640,250 650,280 600,280 605,260 615,245"/>
    <!-- Graded surface marks -->
    <line x1="60" y1="330" x2="80" y2="330"/>
    <line x1="120" y1="330" x2="140" y2="330"/>
    <line x1="250" y1="330" x2="270" y2="330"/>
    <line x1="540" y1="330" x2="560" y2="330"/>
  </g>
</svg>
